<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Brain Shadow — Gemini</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 320px;
        min-height: 260px;
        background: #0d0d14;
        color: #e2e2f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
      }

      .header {
        background: linear-gradient(135deg, #1a73e8, #0d47a1);
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .header-icon { font-size: 22px; }

      .header-text { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 0.03em; }
      .header-sub  { font-size: 10px; color: rgba(255,255,255,.65); margin-top: 1px; }

      .actions {
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      button {
        width: 100%;
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        transition: opacity .15s;
      }
      button:disabled { opacity: .5; cursor: not-allowed; }
      button:hover:not(:disabled) { opacity: .88; }

      #extractAllBtn  { background: #1a73e8; color: #fff; }
      #downloadJsonBtn { background: #34a853; color: #fff; display: none; }
      #clearCacheBtn  { background: rgba(234,67,53,.15); color: #ea4335; border: 1px solid rgba(234,67,53,.3); }

      #status {
        margin: 0 14px;
        font-size: 12px;
        min-height: 18px;
        color: #aaa;
      }

      #progressBar {
        display: none;
        width: calc(100% - 28px);
        margin: 8px 14px 0;
        height: 4px;
        accent-color: #1a73e8;
      }

      #details {
        margin: 6px 14px 14px;
        font-size: 11px;
        color: #666;
        min-height: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .backend-section {
        border-top: 1px solid #1e1e2e;
        padding: 10px 14px;
      }

      .backend-label { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: #555; margin-bottom: 6px; }

      .backend-row { display: flex; gap: 6px; }

      .backend-row input {
        flex: 1;
        background: #1a1a24;
        border: 1px solid #2a2a38;
        border-radius: 6px;
        padding: 5px 8px;
        color: #e2e2f0;
        font-size: 11px;
        font-family: monospace;
        outline: none;
      }
      .backend-row input:focus { border-color: #1a73e8; }

      .backend-row button {
        width: auto;
        padding: 5px 10px;
        font-size: 11px;
        background: #1e1e2e;
        border: 1px solid #2a2a38;
        color: #aaa;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-icon">✨</div>
      <div>
        <div class="header-text">Brain Shadow — Gemini</div>
        <div class="header-sub">Capture your Gemini conversations</div>
      </div>
    </div>

    <div class="actions">
      <button id="extractAllBtn">🔄 Scan All Conversations</button>
      <button id="downloadJsonBtn">⬇️ Download JSON</button>
      <button id="clearCacheBtn">🗑️ Clear Cache</button>
    </div>

    <div id="status"></div>
    <progress id="progressBar" value="0" max="100"></progress>
    <div id="details"></div>

    <div class="backend-section">
      <div class="backend-label">Backend URL</div>
      <div class="backend-row">
        <input type="text" id="backendUrl" placeholder="http://localhost:8000" />
        <button id="btnSaveUrl">Save</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
