<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Claude Extractor</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 12px; }
      button { padding: 8px 12px; font-size: 13px; margin-right: 8px; }
      #clearCacheBtn { background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; }
      #extractAllBtn { background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
      #downloadJsonBtn { background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; display: none; }
      #clearCacheBtn:hover { background: #d32f2f; }
      #extractAllBtn:hover { background: #45a049; }
      #downloadJsonBtn:hover { background: #1976D2; }
      #status { margin-top: 12px; font-size: 13px; min-height: 20px; }
      #progressBar { width: 100%; margin-top: 10px; display: none; }
      #details { margin-top: 10px; font-size: 12px; color: #555; min-height: 16px; }
      .button-group { margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <div class="button-group">
      <button id="extractAllBtn">🔄 Scan All Conversations</button>
      <button id="downloadJsonBtn">⬇️ Download JSON</button>
      <button id="clearCacheBtn">🗑️ Clear Cache</button>
    </div>
    <div id="status"></div>
    <progress id="progressBar" value="0" max="100"></progress>
    <div id="details"></div>
    <script src="popup.js"></script>
  </body>
</html>
