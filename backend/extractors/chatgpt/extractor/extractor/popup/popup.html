<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brain Shadow</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a24;
      --border: #2a2a38;
      --accent: #7c6aff;
      --accent2: #a78bfa;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --text: #e2e2f0;
      --muted: #6b6b8a;
      --card: #13131e;
    }

    body {
      width: 340px;
      min-height: 420px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), #5b4fe0);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-text {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .logo-text span {
      color: var(--accent2);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat-box {
      background: var(--bg2);
      padding: 12px 10px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent2);
      line-height: 1;
    }

    .stat-label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    /* Platform badges */
    .platforms {
      padding: 10px 14px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }

    .badge {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 9px;
      font-size: 10px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .badge.active {
      border-color: var(--accent);
      color: var(--accent2);
      background: rgba(124, 106, 255, 0.1);
    }

    .badge .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Buttons */
    .actions {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      letter-spacing: 0.02em;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #5b4fe0);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(124, 106, 255, 0.35);
    }

    .btn-secondary {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent2);
    }

    .btn-danger {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--red);
    }

    .btn-danger:hover {
      background: rgba(248, 113, 113, 0.2);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    /* Progress bar */
    .progress-section {
      padding: 0 14px 10px;
      display: none;
    }

    .progress-section.visible { display: block; }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .progress-label {
      font-size: 11px;
      color: var(--muted);
    }

    .progress-count {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--accent2);
    }

    .progress-bar-bg {
      height: 4px;
      background: var(--bg3);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-title {
      margin-top: 5px;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Recent conversations */
    .recent-section {
      border-top: 1px solid var(--border);
      padding: 10px 14px;
    }

    .section-title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .conv-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 120px;
      overflow-y: auto;
    }

    .conv-list::-webkit-scrollbar { width: 3px; }
    .conv-list::-webkit-scrollbar-track { background: transparent; }
    .conv-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .conv-platform {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 4px;
      background: rgba(124, 106, 255, 0.15);
      color: var(--accent2);
      font-family: 'Space Mono', monospace;
      flex-shrink: 0;
    }

    .conv-title {
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .conv-msgs {
      font-size: 9px;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* Settings panel */
    .settings-section {
      border-top: 1px solid var(--border);
      padding: 10px 14px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .settings-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text);
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      outline: none;
    }

    .settings-input:focus {
      border-color: var(--accent);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 11px;
      border-radius: 6px;
      white-space: nowrap;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 11px;
      color: var(--text);
      transition: transform 0.2s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      padding: 10px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🧠</div>
      <div class="logo-text">BRAIN<span>SHADOW</span></div>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num" id="totalConvs">0</div>
      <div class="stat-label">Chats</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="totalMsgs">0</div>
      <div class="stat-label">Messages</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="totalPlatforms">0</div>
      <div class="stat-label">Platforms</div>
    </div>
  </div>

  <!-- Platform badges -->
  <div class="platforms" id="platformBadges">
    <div class="badge" id="badge-chatgpt"><span class="dot"></span>ChatGPT</div>
    <div class="badge" id="badge-claude"><span class="dot"></span>Claude</div>
    <div class="badge" id="badge-deepseek"><span class="dot"></span>DeepSeek</div>
  </div>

  <!-- Progress bar (shown during bulk import) -->
  <div class="progress-section" id="progressSection">
    <div class="progress-header">
      <span class="progress-label" id="progressLabel">Importing...</span>
      <span class="progress-count" id="progressCount">0 / 0</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-title" id="progressTitle">Starting...</div>
  </div>

  <!-- Action Buttons -->
  <div class="actions">
    <button class="btn btn-primary" id="btnBulkImport">
      ⚡ Bulk Import All Past Chats
    </button>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-secondary" id="btnCaptureCurrent" style="flex:1">
        📸 Capture Current
      </button>
      <button class="btn btn-secondary" id="btnExport" style="flex:1">
        💾 Export JSON
      </button>
    </div>
    <button class="btn btn-secondary" id="btnSyncBackend">
      ☁️ Sync All to Backend
    </button>
    <button class="btn btn-danger" id="btnClear">
      🗑 Clear All Data
    </button>
  </div>

  <!-- Recent Conversations -->
  <div class="recent-section">
    <div class="section-title">Recently Captured</div>
    <div class="conv-list" id="convList">
      <div class="empty-state">No conversations captured yet</div>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings-section">
    <div class="section-title">Backend URL</div>
    <div class="settings-row">
      <input
        type="text"
        class="settings-input"
        id="backendUrl"
        placeholder="http://localhost:8000"
      />
      <button class="btn btn-secondary btn-sm" id="btnSaveUrl">Save</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
